version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: mcp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: mcp_demo
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  mcp-server:
    build: ./mcp-server
    container_name: mcp-server
    ports:
      - "8081:8081"
    environment:
      MCP_DB_HOST: mysql
      MCP_DB_PORT: "3306"
      MCP_DB_NAME: mcp_demo
      MCP_DB_USERNAME: root
      MCP_DB_PASSWORD: root123
    depends_on:
      mysql:
        condition: service_healthy

  mcp-client:
    build: ./mcp-client
    container_name: mcp-client
    ports:
      - "8082:8082"
    environment:
      MCP_SERVERS_0_NAME: db-server
      MCP_SERVERS_0_URL: http://mcp-server:8081
    depends_on:
      - mcp-server

  mcp-host:
    build: ./mcp-host
    container_name: mcp-host
    ports:
      - "8080:8080"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_URL: ${OPENAI_API_URL:-https://api.openai.com/v1}
      MCP_CLIENT_URL: http://mcp-client:8082
    depends_on:
      - mcp-client

volumes:
  mysql_data:
