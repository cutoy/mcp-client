name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [mcp-server, mcp-client, mcp-host]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Build ${{ matrix.service }}
        run: mvn compile -q -f ${{ matrix.service }}/pom.xml

  integration-test:
    runs-on: ubuntu-latest
    needs: build
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: mcp_demo
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=5s --health-timeout=5s --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Init test data
        run: |
          sudo apt-get install -y mysql-client
          mysql -h 127.0.0.1 -u root -proot123 < init.sql

      - name: Start mcp-server
        run: |
          cd mcp-server
          nohup mvn spring-boot:run -Dspring-boot.run.arguments="--mcp.db.host=127.0.0.1 --mcp.db.port=3306 --mcp.db.name=mcp_demo --mcp.db.username=root --mcp.db.password=root123" > server.log 2>&1 &
          echo $! > ../server.pid
          sleep 15

      - name: Test mcp-server
        run: |
          curl -s -X POST http://localhost:8081/mcp \
            -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","method":"tools/list","id":1}'
          curl -s -X POST http://localhost:8081/mcp \
            -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","method":"tools/call","params":{"name":"get_schema","arguments":{}},"id":2}'

      - name: Start mcp-client
        run: |
          cd mcp-client
          nohup mvn spring-boot:run -Dspring-boot.run.arguments="--mcp.servers[0].name=db-server --mcp.servers[0].url=http://localhost:8081" > client.log 2>&1 &
          echo $! > ../client.pid
          sleep 10

      - name: Test mcp-client
        run: |
          curl -s http://localhost:8082/tools
          curl -s -X POST http://localhost:8082/tools/call \
            -H 'Content-Type: application/json' \
            -d '{"serverName":"db-server","toolName":"get_schema","arguments":{}}'

      - name: Cleanup
        if: always()
        run: |
          kill $(cat server.pid) 2>/dev/null || true
          kill $(cat client.pid) 2>/dev/null || true
